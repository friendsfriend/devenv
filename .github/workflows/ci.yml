name: CI

on:
  push:
    branches: ["**"]
    tags:
      - "**"
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-go:
    name: Test (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: fmt
        run: go fmt $(go list ./... | grep -v /vendor/)
        working-directory: server

      - name: vet
        run: go vet $(go list ./... | grep -v /vendor/)
        working-directory: server

      - name: test
        run: go test -race $(go list ./... | grep -v /vendor/)
        working-directory: server

  test-tui:
    name: Test (TUI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install TUI dependencies
        run: bun install
        working-directory: tui

      - name: Type check
        run: bun run type-check
        working-directory: tui

      - name: Test
        run: bun run test
        working-directory: tui

  build-binaries:
    name: Build (all platforms)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: [test-go, test-tui]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Bump version and move tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          export VERSION
          echo "Bumping package versions to ${VERSION}"

          bun -e '
            const version = process.env.VERSION;
            const paths = [
              "package.json",
              "tui/package.json",
              "tui/packages/cli/package.json",
              "tui/packages/core/package.json",
              "tui/packages/types/package.json",
              "tui/packages/ui/package.json",
            ];
            for (const path of paths) {
              const pkg = await Bun.file(path).json();
              pkg.version = version;
              await Bun.write(path, `${JSON.stringify(pkg, null, 2)}\n`);
            }
            const lockPath = "tui/bun.lock";
            let lock = await Bun.file(lockPath).text();
            let count = 0;
            lock = lock.replace(/"version": "\\d+\\.\\d+\\.\\d+",/g, (match) => {
              count += 1;
              return count <= 4 ? `"version": "${version}",` : match;
            });
            await Bun.write(lockPath, lock);
          '

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json tui/package.json tui/packages/*/package.json tui/bun.lock

          if git diff --cached --quiet; then
            echo "Version already ${VERSION}; tag unchanged."
            exit 0
          fi

          git commit -m "Bump version to ${VERSION}"
          git tag -f "${TAG_NAME}"
          git push origin "refs/tags/${TAG_NAME}" --force

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            tui/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('tui/bun.lock') }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Install TUI dependencies
        run: bun install
        working-directory: tui

      - name: Build
        run: bun run build.ts

      - name: Create release archives
        run: |
          cd dist/tui
          for dir in devenv-*; do
            tar czf "${dir}.tar.gz" "$dir"
          done
          ls -la *.tar.gz

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tui/devenv-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update homebrew-tap formula
        env:
          GH_TAP_TOKEN: ${{ secrets.GH_TAP_TOKEN }}
        run: |
          if [ -z "$GH_TAP_TOKEN" ]; then
            echo "SKIP — GH_TAP_TOKEN not set (tap update not configured)"
            exit 0
          fi

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          echo "Computing SHA256 from local tarballs..."
          cd dist/tui
          SHA256_DARWIN_ARM64="$(shasum -a 256 devenv-darwin-arm64.tar.gz | cut -d' ' -f1)"
          SHA256_DARWIN_X64="$(shasum -a 256 devenv-darwin-x64.tar.gz | cut -d' ' -f1)"
          SHA256_LINUX_ARM64="$(shasum -a 256 devenv-linux-arm64.tar.gz | cut -d' ' -f1)"
          SHA256_LINUX_X64="$(shasum -a 256 devenv-linux-x64.tar.gz | cut -d' ' -f1)"

          echo "Cloning homebrew-tap..."
          cd /tmp
          git clone "https://x-access-token:${GH_TAP_TOKEN}@github.com/friendsfriend/homebrew-tap.git"
          cd homebrew-tap

          echo "Updating Formula/devenv.rb to v${VERSION}..."
          sed -i 's/version "[0-9.]*"/version "'"$VERSION"'"/' Formula/devenv.rb
          sed -i '/devenv-darwin-arm64\.tar\.gz/{n;s/sha256 ".*"/sha256 "'"$SHA256_DARWIN_ARM64"'"/}' Formula/devenv.rb
          sed -i '/devenv-darwin-x64\.tar\.gz/{n;s/sha256 ".*"/sha256 "'"$SHA256_DARWIN_X64"'"/}' Formula/devenv.rb
          sed -i '/devenv-linux-arm64\.tar\.gz/{n;s/sha256 ".*"/sha256 "'"$SHA256_LINUX_ARM64"'"/}' Formula/devenv.rb
          sed -i '/devenv-linux-x64\.tar\.gz/{n;s/sha256 ".*"/sha256 "'"$SHA256_LINUX_X64"'"/}' Formula/devenv.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/devenv.rb

          if git diff --cached --quiet; then
            echo "No changes — formula already up-to-date."
            exit 0
          fi

          git commit -m "Update devenv formula to ${VERSION}"
          git push
          echo "Done — homebrew-tap updated to v${VERSION}"
